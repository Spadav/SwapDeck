services:
  ignite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ignite
    restart: "${IGNITE_RESTART_POLICY:-no}"
    gpus: all
    ports:
      - "${IGNITE_PORT:-3000}:3000"
    environment:
      IGNITE_DOCKER: "1"
      LLAMA_SWAP_URL: "http://llama-runtime:8090"
      LLMFIT_URL: "http://llmfit:8787"
      IGNITE_MODELS_DIR: "${IGNITE_MODELS_DIR:-${SWAPDECK_MODELS_DIR:-./models}}"
      IGNITE_CONFIG_DIR: "${IGNITE_CONFIG_DIR:-${SWAPDECK_CONFIG_DIR:-./config}}"
      IGNITE_PORT: "${IGNITE_PORT:-3000}"
      LLAMA_SWAP_PORT: "${LLAMA_SWAP_PORT:-8090}"
      IGNITE_APP_VERSION: "1.0.0"
      LLAMA_CPP_IMAGE_REF: "ghcr.io/ggml-org/llama.cpp:server-cuda"
      LLAMA_SWAP_VERSION_REF: "198"
      LLMFIT_IMAGE_REF: "ghcr.io/alexsjones/llmfit:latest"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${IGNITE_MODELS_DIR:-${SWAPDECK_MODELS_DIR:-./models}}:/models
      - ${IGNITE_CONFIG_DIR:-${SWAPDECK_CONFIG_DIR:-./config}}:/config
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - llama-runtime
      - llmfit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llama-runtime:
    build:
      context: .
      dockerfile: docker/llama-runtime/Dockerfile
    container_name: llama-runtime
    restart: "${IGNITE_RESTART_POLICY:-no}"
    gpus: all
    ports:
      - "${LLAMA_SWAP_PORT:-8090}:8090"
    volumes:
      - ${IGNITE_MODELS_DIR:-${SWAPDECK_MODELS_DIR:-./models}}:/models
      - ${IGNITE_CONFIG_DIR:-${SWAPDECK_CONFIG_DIR:-./config}}:/config
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llmfit:
    image: ghcr.io/alexsjones/llmfit:latest
    container_name: llmfit
    restart: "${IGNITE_RESTART_POLICY:-no}"
    command: ["serve", "--host", "0.0.0.0", "--port", "8787"]
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
