healthCheck:
  model: ExampleModel

globalTTL: 0
startPort: 5800

models:
  ExampleModel:
    name: Example Model
    cmd: >
      /app/llama-server
      -m /models/REPLACE_WITH_MODEL.gguf
      --host 0.0.0.0
      --port ${PORT}
      -ngl 99
      -fa on
      -c 4096
    proxy: http://127.0.0.1:${PORT}
